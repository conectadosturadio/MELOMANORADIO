<script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>

<script src="https://extassisnetwork.com/player/Luna/luna.js"></script>

<div class="music-particles"></div>

<!-- PLAYER -->
<div id="extassisnetwork-wrap">

    <!-- GLOW -->
    <div class="neon-glow"></div>

    <div id="extassisnetwork"></div>

    <!-- CREDITOS -->
    <div class="vg-credit">
        Created By: @virtualgraphic.pa
    </div>

</div>

<script>

$("#extassisnetwork").lunaradio({

    streamurl: "https://stream.zeno.fm/g0gymeeh6tsuv",

    radioname: "MELÓMANO RADIO",

    coverimage: "https://raw.githubusercontent.com/conectadosturadio/MELOMANOFOTOPERFIL/main/Gemini_Generated_Image_i56heri56heri56h.png",

    onlycoverimage: false,

    userinterface: "big",

    backgroundcolor: "rgba(5,5,5,.78)",

    fontcolor: "#39ff14",

    hightlightcolor: "#ffea00",

    fontname: "Be Vietnam",

    googlefont: "Be Vietnam",

    fontratio: "0.4",

    scroll: "true",

    coverstyle: "animated",

    usevisualizer: "real",

    visualizertype: "6",

    streamtype: "shoutcast2",

    shoutcastpath: "/stream",

    shoutcastid: "1",

    metadatainterval: "5000",

    volume: "100",

    usestreamcorsproxy: "true",

});

</script>

<style>

/* ───────── RESET ───────── */

*{

    box-sizing:border-box;

}

/* ───────── BODY ───────── */

body{

    margin:0;

    padding:20px;

    background:#020202;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    overflow:hidden;

    position:relative;

    font-family:'Be Vietnam',sans-serif;

}

/* ───────── FONDO ANIMADO ───────── */

.music-particles{

    position:fixed;

    inset:0;

    background:

    radial-gradient(circle at 20% 20%,
    rgba(57,255,20,.18),
    transparent 25%),

    radial-gradient(circle at 80% 30%,
    rgba(255,0,128,.18),
    transparent 25%),

    radial-gradient(circle at 40% 80%,
    rgba(0,255,255,.18),
    transparent 25%),

    radial-gradient(circle at 70% 70%,
    rgba(255,234,0,.18),
    transparent 25%);

    animation:moveLights 18s linear infinite alternate;

    filter:blur(45px);

    opacity:.9;

}

/* ───────── PLAYER WRAP ───────── */

#extassisnetwork-wrap{

    width:100%;

    max-width:360px;

    aspect-ratio:360/480;

    position:relative;

    overflow:hidden;

    border-radius:26px;

    background:rgba(5,5,5,.72);

    backdrop-filter:blur(14px);

    border:2px solid transparent;

    animation:neonBorder 6s linear infinite;

    box-shadow:

    0 0 18px rgba(57,255,20,.55),

    0 0 45px rgba(255,0,128,.28),

    0 0 70px rgba(0,255,255,.2);

}

/* ───────── GLOW EXTRA ───────── */

.neon-glow{

    position:absolute;

    inset:-20px;

    z-index:-1;

    border-radius:30px;

    background:linear-gradient(
    45deg,
    #39ff14,
    #ffea00,
    #ff0080,
    #00ffff,
    #39ff14
    );

    filter:blur(60px);

    opacity:.45;

    animation:rotateGlow 12s linear infinite;

}

/* ───────── PLAYER ───────── */

#extassisnetwork{

    width:100% !important;

    height:100% !important;

    background:transparent !important;

    overflow:hidden;

}

/* ───────── TEXTOS ───────── */

#extassisnetwork *{

    color:#39ff14 !important;

    text-shadow:
    0 0 8px rgba(57,255,20,.9);

}

/* ───────── BOTONES ───────── */

#extassisnetwork button{

    background:rgba(10,10,10,.7) !important;

    border:1px solid #ffea00 !important;

    box-shadow:
    0 0 14px rgba(255,234,0,.75);

}

/* ───────── PLAY ───────── */

#extassisnetwork .fa-play,
#extassisnetwork .fa-pause{

    color:#ff2d55 !important;

    text-shadow:
    0 0 10px #ff2d55,
    0 0 25px #ff2d55;

}

/* ───────── IMAGEN ───────── */

#extassisnetwork img{

    animation:musicBeat 1s infinite ease-in-out;

    transform-origin:center;

    border-radius:18px;

    box-shadow:

    0 0 14px #39ff14,

    0 0 35px rgba(57,255,20,.65);

}

/* ───────── VISUALIZER ───────── */

canvas{

    filter:
    drop-shadow(0 0 10px #39ff14)
    drop-shadow(0 0 18px #ffea00);

}

/* ───────── CREDITOS ───────── */

.vg-credit{

    position:absolute;

    bottom:6px;

    left:0;

    width:100%;

    text-align:center;

    font-size:7px;

    letter-spacing:1px;

    color:#39ff14;

    text-shadow:
    0 0 8px rgba(57,255,20,.95);

    z-index:999;

    pointer-events:none;

    opacity:.85;

}

/* ───────── LATIDO ───────── */

@keyframes musicBeat{

    0%{

        transform:scale(1);

        filter:brightness(1);

    }

    50%{

        transform:scale(1.08);

        filter:brightness(1.25);

    }

    100%{

        transform:scale(1);

        filter:brightness(1);

    }

}

/* ───────── BORDE NEON ───────── */

@keyframes neonBorder{

    0%{

        border-color:#39ff14;

        box-shadow:
        0 0 18px #39ff14,
        0 0 45px rgba(57,255,20,.45);

    }

    25%{

        border-color:#ffea00;

        box-shadow:
        0 0 18px #ffea00,
        0 0 45px rgba(255,234,0,.45);

    }

    50%{

        border-color:#ff0080;

        box-shadow:
        0 0 18px #ff0080,
        0 0 45px rgba(255,0,128,.45);

    }

    75%{

        border-color:#00ffff;

        box-shadow:
        0 0 18px #00ffff,
        0 0 45px rgba(0,255,255,.45);

    }

    100%{

        border-color:#39ff14;

        box-shadow:
        0 0 18px #39ff14,
        0 0 45px rgba(57,255,20,.45);

    }

}

/* ───────── GLOW ROTATE ───────── */

@keyframes rotateGlow{

    from{

        transform:rotate(0deg);

    }

    to{

        transform:rotate(360deg);

    }

}

/* ───────── LUCES ───────── */

@keyframes moveLights{

    0%{

        transform:scale(1) translateY(0px);

    }

    100%{

        transform:scale(1.2) translateY(-20px);

    }

}

/* ───────── RESPONSIVE ───────── */

@media(max-width:480px){

    body{

        padding:10px;

    }

    #extassisnetwork-wrap{

        max-width:100%;

        border-radius:22px;

    }

}

</style>
