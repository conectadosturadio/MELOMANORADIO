<div id="extassisnetwork-wrap">

    <div id="extassisnetwork"></div>

    <!-- CREDITOS -->
    <div class="vg-credit">
        Created By: @virtualgraphic.pa
    </div>

</div>

<script>

$("#extassisnetwork").lunaradio({

    streamurl: "https://stream.zeno.fm/g0gymeeh6tsuv",

    radioname: "MELÓMANO RADIO",

    coverimage: "https://raw.githubusercontent.com/conectadosturadio/MELOMANOFOTOPERFIL/main/Gemini_Generated_Image_i56heri56heri56h.png",

    onlycoverimage: false,

    userinterface: "big",

    backgroundcolor: "#050505",

    fontcolor: "#39ff14",

    hightlightcolor: "#ffea00",

    fontname: "Be Vietnam",

    googlefont: "Be Vietnam",

    fontratio: "0.4",

    scroll: "true",

    coverstyle: "animated",

    usevisualizer: "real",

    visualizertype: "6",

    streamtype: "shoutcast2",

    shoutcastpath: "/stream",

    shoutcastid: "1",

    metadatainterval: "5000",

    volume: "100",

    usestreamcorsproxy: "true",

});

</script>

<style>

/* ───────── RESET ───────── */

*{

    box-sizing:border-box;

}

/* ───────── BODY ───────── */

body{

    margin:0;

    padding:0;

    background:#000;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    overflow-x:hidden;

}

/* ───────── PLAYER WRAP ───────── */

#extassisnetwork-wrap{

    width:100%;

    max-width:360px;

    aspect-ratio:360/480;

    position:relative;

    overflow:hidden;

    border-radius:24px;

    background:#050505;

    border:2px solid #39ff14;

    box-shadow:
    0 0 10px #39ff14,
    0 0 25px rgba(57,255,20,.7),
    0 0 45px rgba(255,234,0,.25);

}

/* ───────── PLAYER ───────── */

#extassisnetwork{

    width:100% !important;

    height:100% !important;

    background:#050505 !important;

    overflow:hidden;

}

/* ───────── TEXTOS ───────── */

#extassisnetwork *{

    color:#39ff14 !important;

    text-shadow:
    0 0 8px rgba(57,255,20,.8);

}

/* ───────── BOTONES ───────── */

#extassisnetwork button{

    background:#101010 !important;

    border:1px solid #ffea00 !important;

    box-shadow:
    0 0 10px rgba(255,234,0,.7);

}

/* ───────── PLAY / PAUSE ───────── */

#extassisnetwork .fa-play,
#extassisnetwork .fa-pause{

    color:#ff2d2d !important;

    text-shadow:
    0 0 10px #ff2d2d,
    0 0 22px #ff2d2d;

}

/* ───────── IMAGEN ───────── */

#extassisnetwork img{

    animation:musicBeat 1s infinite ease-in-out;

    transform-origin:center;

    border-radius:18px;

    box-shadow:
    0 0 12px #39ff14,
    0 0 30px rgba(57,255,20,.6);

}

/* ───────── EFECTO MUSICAL ───────── */

@keyframes musicBeat{

    0%{

        transform:scale(1);

        filter:brightness(1);

    }

    25%{

        transform:scale(1.03);

        filter:brightness(1.1);

    }

    50%{

        transform:scale(1.08);

        filter:brightness(1.25);

    }

    75%{

        transform:scale(1.03);

        filter:brightness(1.1);

    }

    100%{

        transform:scale(1);

        filter:brightness(1);

    }

}

/* ───────── VISUALIZER ───────── */

canvas{

    filter:
    drop-shadow(0 0 8px #39ff14)
    drop-shadow(0 0 14px #ffea00);

}

/* ───────── CREDITOS ───────── */

.vg-credit{

    position:absolute;

    bottom:6px;

    left:0;

    width:100%;

    text-align:center;

    font-size:8px;

    letter-spacing:.8px;

    color:#39ff14;

    font-family:'Be Vietnam',sans-serif;

    text-shadow:
    0 0 6px rgba(57,255,20,.9);

    z-index:999;

    pointer-events:none;

    opacity:.9;

}

/* ───────── RESPONSIVE PERFECTO ───────── */

@media(max-width:480px){

    body{

        padding:10px;

    }

    #extassisnetwork-wrap{

        width:100%;

        max-width:100%;

        border-radius:20px;

    }

}

</style>
