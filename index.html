<script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>

<script src="https://extassisnetwork.com/player/Luna/luna.js"></script>

<!-- PLAYER -->
<div id="extassisnetwork-wrap">

    <!-- GLOW -->
    <div class="neon-glow"></div>

    <!-- REPRODUCTOR -->
    <div id="extassisnetwork"></div>

    <!-- CREDITOS -->
    <div class="vg-credit">
        Created By: @virtualgraphic.pa
    </div>

</div>

<script>

$("#extassisnetwork").lunaradio({

    streamurl: "https://stream.zeno.fm/g0gymeeh6tsuv",

    radioname: "MELÓMANO RADIO",

    /* TU FOTO ORIGINAL */

    coverimage: "https://raw.githubusercontent.com/conectadosturadio/MELOMANOFOTOPERFIL/main/Gemini_Generated_Image_i56heri56heri56h.png",

    onlycoverimage: false,

    userinterface: "big",

    /* EL FONDO DEL PLAYER SE DEJA */

    backgroundcolor: "rgba(5,5,5,.78)",

    fontcolor: "#39ff14",

    hightlightcolor: "#ffea00",

    fontname: "Be Vietnam",

    googlefont: "Be Vietnam",

    fontratio: "0.4",

    scroll: "true",

    coverstyle: "animated",

    usevisualizer: "real",

    visualizertype: "6",

    streamtype: "shoutcast2",

    shoutcastpath: "/stream",

    shoutcastid: "1",

    metadatainterval: "5000",

    volume: "100",

    usestreamcorsproxy: "true",

});

</script>

<style>

/* ───────── RESET ───────── */

*{

    box-sizing:border-box;

}

/* ───────── BODY TRANSPARENTE ───────── */

body{

    margin:0;

    padding:20px;

    background:transparent !important;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    overflow:hidden;

    font-family:'Be Vietnam',sans-serif;

}

/* ───────── WRAP ───────── */

#extassisnetwork-wrap{

    width:92%;

    max-width:330px;

    aspect-ratio:360/480;

    position:relative;

    overflow:hidden;

    border-radius:26px;

    /* TRANSPARENTE SOLO EL EXTERIOR */

    background:transparent;

    border:2px solid transparent;

    animation:neonBorder 6s linear infinite;

    box-shadow:

    0 0 18px rgba(57,255,20,.45),

    0 0 45px rgba(255,0,128,.18),

    0 0 70px rgba(0,255,255,.12);

}

/* ───────── GLOW ───────── */

.neon-glow{

    position:absolute;

    inset:-20px;

    z-index:-1;

    border-radius:30px;

    background:linear-gradient(
    45deg,
    #39ff14,
    #ffea00,
    #ff0080,
    #00ffff,
    #39ff14
    );

    filter:blur(60px);

    opacity:.35;

    animation:rotateGlow 12s linear infinite;

}

/* ───────── PLAYER ───────── */

#extassisnetwork{

    width:100% !important;

    height:100% !important;

    /* AQUI YA NO SE TOCA EL FONDO DEL PLAYER */

    overflow:hidden;

}

/* ───────── CREDITOS ───────── */

.vg-credit{

    position:absolute;

    bottom:6px;

    left:0;

    width:100%;

    text-align:center;

    font-size:7px;

    letter-spacing:1px;

    color:#39ff14;

    text-shadow:
    0 0 8px rgba(57,255,20,.95);

    z-index:999;

    pointer-events:none;

    opacity:.85;

}

/* ───────── BORDE NEON ───────── */

@keyframes neonBorder{

    0%{

        border-color:#39ff14;

        box-shadow:
        0 0 18px #39ff14,
        0 0 45px rgba(57,255,20,.35);

    }

    25%{

        border-color:#ffea00;

        box-shadow:
        0 0 18px #ffea00,
        0 0 45px rgba(255,234,0,.35);

    }

    50%{

        border-color:#ff0080;

        box-shadow:
        0 0 18px #ff0080,
        0 0 45px rgba(255,0,128,.35);

    }

    75%{

        border-color:#00ffff;

        box-shadow:
        0 0 18px #00ffff,
        0 0 45px rgba(0,255,255,.35);

    }

    100%{

        border-color:#39ff14;

        box-shadow:
        0 0 18px #39ff14,
        0 0 45px rgba(57,255,20,.35);

    }

}

/* ───────── ROTACION ───────── */

@keyframes rotateGlow{

    from{

        transform:rotate(0deg);

    }

    to{

        transform:rotate(360deg);

    }

}

/* ───────── RESPONSIVE ───────── */

@media(max-width:480px){

    body{

        padding:16px;

    }

    #extassisnetwork-wrap{

        width:88%;

        max-width:320px;

    }

}

</style>
